name: Akbelen Haftalık İzleme

on:
  schedule:
    - cron: '0 6 * * 1'  # Her Pazartesi 06:00 UTC
  workflow_dispatch:      # Manuel tetikleme butonu

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
    - name: Repository'yi çek
      uses: actions/checkout@v4

    - name: Python kur
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Bağımlılıkları yükle
      run: |
        pip install requests numpy pillow

    - name: İzleme scriptini çalıştır
      run: python scripts/fetch_imagery.py

    - name: Raporu commit et
      run: |
        git config --global user.email "action@github.com"
        git config --global user.name "Akbelen Monitor Bot"
        git add reports/
       git diff --staged --quiet && echo "Değişiklik yok" || git commit -m "Otomatik rapor: $(date +%Y-%m-%d)"
        git push
